<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jarvis</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #050505, #000);
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* LOGO */
#logo {
  width: 140px;
  height: 140px;
  background: url('logo.jpeg') center/cover;
  border-radius: 50%;
  box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff, 0 0 40px #00f7ff;
  animation: girar 4s linear infinite;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* pulsar */
.falando {
  animation: pulsar 0.5s infinite;
}

@keyframes pulsar {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* resposta */
#resposta {
  position: absolute;
  bottom: 100px;
  width: 90%;
  text-align: center;
  font-size: 18px;
  color: #00f7ff;
}

/* input */
#box {
  position: absolute;
  bottom: 20px;
  width: 90%;
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: #111;
  color: white;
}

button {
  margin-left: 10px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #00f7ff;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="logo"></div>
<div id="resposta"></div>

<div id="box">
  <input id="input" placeholder="Fala Jarvis..." />
  <button onclick="enviar()">OK</button>
</div>

<script>
const API_KEY = "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";

function falar(texto) {
  try {
    const msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "pt-BR";
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
  } catch(e){}
}

async function enviar() {
  let texto = document.getElementById("input").value;
  if (!texto) return;

  let respostaDiv = document.getElementById("resposta");
  let logo = document.getElementById("logo");

  respostaDiv.innerText = "Pensando...";
  logo.classList.add("falando");

  try {
    let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": "https://haxxbyluczx.github.io",
        "X-Title": "Jarvis"
      },
      body: JSON.stringify({
        model: "openai/gpt-4o-mini",
        messages: [
          { role: "system", content: "Você é Jarvis, direto e inteligente." },
          { role: "user", content: texto }
        ]
      })
    });

    let data = await res.json();
    let resposta = data.choices[0].message.content;

    respostaDiv.innerText = resposta;
    falar(resposta);

  } catch(e) {
    respostaDiv.innerText = "erro ao conectar";
    falar("erro ao conectar");
  }

  logo.classList.remove("falando");
}
</script>

</body>
</html>
