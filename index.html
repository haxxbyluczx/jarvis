<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jarvis</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* LOGO */
#logo {
  width: 120px;
  height: 120px;
  background: url('https://i.imgur.com/7YuweP1.png') center/cover;
  border-radius: 20px;
  animation: girar 3s linear infinite;
}

/* girar */
@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* pulsar quando fala */
.falando {
  animation: pulsar 0.6s infinite;
}

@keyframes pulsar {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* resposta */
#resposta {
  position: absolute;
  bottom: 90px;
  width: 90%;
  text-align: center;
  font-size: 18px;
}

/* input */
#box {
  position: absolute;
  bottom: 20px;
  width: 90%;
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  margin-left: 10px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #ff4b5c;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="logo"></div>
<div id="resposta"></div>

<div id="box">
  <input id="input" placeholder="Fala Jarvis..." />
  <button onclick="enviar()">OK</button>
</div>

<script>
const API_KEY = "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 ";

async function enviar() {
  let texto = document.getElementById("input").value;

  if (!texto) return;

  let respostaDiv = document.getElementById("resposta");
  let logo = document.getElementById("logo");

  respostaDiv.innerText = "Pensando...";

  try {
    let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "openai/gpt-4o-mini",
        messages: [
          { role: "system", content: "Você é Jarvis, assistente inteligente e direto." },
          { role: "user", content: texto }
        ]
      })
    });

    let data = await res.json();
    let resposta = data.choices[0].message.content;

    respostaDiv.innerText = resposta;

    falar(resposta);

  } catch (e) {
    respostaDiv.innerText = "Erro na conexão...";
  }
}

function falar(texto) {
  let logo = document.getElementById("logo");

  let msg = new SpeechSynthesisUtterance(texto);
  msg.lang = "pt-BR";

  // ativa animação
  logo.classList.add("falando");

  msg.onend = () => {
    logo.classList.remove("falando");
  };

  speechSynthesis.speak(msg);
}
</script>

</body>
</html>
