<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>JARVIS AI</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffe1;
    font-family: Arial;
}

h1 {
    text-align: center;
    margin-top: 20px;
    text-shadow: 0 0 10px #00ffe1;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
    border: 1px solid #00ffe1;
    margin: 10px;
}

.user, .jarvis {
    margin: 10px 0;
}

.user { color: white; }
.jarvis { color: #00ffe1; }

input {
    width: 70%;
    padding: 10px;
    margin-left: 10px;
}

button {
    padding: 10px;
    background: #00ffe1;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>JARVIS ONLINE</h1>

<div id="chat"></div>

<input id="input" placeholder="Digite ou fale..." />
<button onclick="enviar()">Enviar</button>
<button onclick="voz()">🎤 Falar</button>

<script>

// ================= MEMÓRIA =================
let memoria = {
    nome: "senhor",
    idade: 15,
    gosto: "basquete"
};

// ================= CHAT =================
function addMsg(tipo, texto){
    let div = document.createElement("div");
    div.className = tipo;
    div.innerText = (tipo === "user" ? "Você: " : "JARVIS: ") + texto;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 9999;
}

// ================= VOZ =================
function falar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "pt-BR";
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

// ================= JARVIS =================
function responder(cmd){
    cmd = cmd.toLowerCase();

    if(cmd.includes("oi") || cmd.includes("olá")){
        return "Olá senhor " + memoria.nome;
    }

    if(cmd.includes("minha idade")){
        return "Sua idade é " + memoria.idade;
    }

    if(cmd.includes("+") || cmd.includes("-") || cmd.includes("*") || cmd.includes("/")){
        try {
            return "Resultado: " + eval(cmd);
        } catch {
            return "Erro no cálculo";
        }
    }

    if(cmd.includes("youtube")){
        window.open("https://youtube.com");
        return "Abrindo YouTube";
    }

    if(cmd.includes("whatsapp")){
        return "Use wa.me/ número";
    }

    if(cmd.includes("mãe")){
        let msg = "Oi mãe";
        if(cmd.includes("dizendo que")){
            msg = cmd.split("dizendo que")[1];
        }
        window.open("https://wa.me/5511971284754?text=" + msg);
        return "Mensagem enviada para sua mãe";
    }

    return "Não entendi, senhor";
}

// ================= ENVIAR =================
function enviar(){
    let input = document.getElementById("input");
    let texto = input.value;

    if(texto === "") return;

    addMsg("user", texto);

    let resposta = responder(texto);

    addMsg("jarvis", resposta);
    falar(resposta);

    input.value = "";
}

// ================= VOZ =================
function voz(){
    let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = "pt-BR";

    rec.onresult = function(e){
        document.getElementById("input").value = e.results[0][0].transcript;
        enviar();
    }

    rec.start();
}

</script>

</body>
</html>g moto
